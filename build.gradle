group = findProperty('projectGroup') ?: 'net.xdob.directory.server'
version = findProperty('projectVersion') ?: '2.0.0-M25'

ext.releaseProperties = new Properties()
def releasePropertiesFile = rootProject.file('signing.properties')

if (releasePropertiesFile.isFile()) {
    releasePropertiesFile.withInputStream { stream ->
        releaseProperties.load(stream)
    }
}

ext.releaseProperty = { String name ->
    def value = rootProject.findProperty(name)

    if (value == null) {
        value = releaseProperties.getProperty(name)
    }

    if (value == null) {
        value = System.getenv(name.replace('.', '_').toUpperCase())
    }

    return value
}


ext.moduleMetadata = projectModel.collectEntries { path, model ->
    [(model.artifactId): [path: path, group: model.group, packaging: model.packaging]]
}

allprojects { project ->
    def model = rootProject.ext.projectModel[project.path]

    if (project == rootProject) {
        project.group = rootProject.group
        project.version = rootProject.version
    } else if (model) {
        project.group = model.group
        project.version = model.version
        project.ext.mavenArtifactId = model.artifactId
        project.ext.mavenPackaging = model.packaging
        project.ext.hasJavaSources = model.hasJavaSources
    }
}

subprojects { project ->
    def model = rootProject.ext.projectModel[project.path]
    def isPomOnly = model?.packaging == 'pom' && !model?.hasJavaSources

    if (isPomOnly) {
        return
    }

    apply plugin: 'java-library'

    java {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'ISO-8859-1'
    }

    configurations {
        testArtifacts {
            canBeConsumed = true
            canBeResolved = false
        }
    }

    tasks.register('testJar', Jar) {
        archiveClassifier.set('tests')
        from sourceSets.test.output
    }

    artifacts {
        testArtifacts tasks.named('testJar')
    }

    dependencies {
        if (project.path == ':core-shared') {
            implementation project.dependencies.project(path: ':core-constants')
        }
        if (project.path in [':xdbm-partition', ':jdbm-partition']) {
            implementation project.dependencies.project(path: ':core-constants')
            implementation "net.sf.ehcache:ehcache:${rootProject.ext.dependencyManagement['net.sf.ehcache:ehcache']}"
        }
        if (project.path == ':jdbm-partition') {
            testImplementation "net.xdob.directory.api:api-ldap-extras-util:${rootProject.ext.dependencyManagement['net.xdob.directory.api:api-ldap-extras-util']}"
        }
        if (project.file('src/test/java').isDirectory()) {
            testImplementation "junit:junit:${rootProject.ext.dependencyManagement['junit:junit']}"
        }

        rootProject.ext.projectDependencies[project.path].each { dep ->
            def configurationName

            switch (dep.scope) {
                case 'test':
                    configurationName = 'testImplementation'
                    break
                case 'provided':
                    configurationName = 'compileOnly'
                    break
                case 'runtime':
                    configurationName = 'runtimeOnly'
                    break
                default:
                    configurationName = 'api'
                    break
            }

            def targetModule = rootProject.ext.moduleMetadata[dep.artifactId]

            if (targetModule && targetModule.group == dep.group) {
                if (dep.type == 'test-jar') {
                    add(configurationName, project.dependencies.project(path: targetModule.path, configuration: 'testArtifacts'))
                } else {
                    add(configurationName, project.dependencies.project(path: targetModule.path))
                }
                return
            }

            def managedVersion = dep.version ?: rootProject.ext.dependencyManagement["${dep.group}:${dep.artifactId}"]

            if (!managedVersion) {
                throw new GradleException("No version found for ${dep.group}:${dep.artifactId} in ${project.path}")
            }

            def notation = "${dep.group}:${dep.artifactId}:${managedVersion}"

            if (dep.classifier) {
                notation = "${notation}:${dep.classifier}"
            }

            add(configurationName, notation)
        }
    }

    tasks.withType(Test).configureEach {
        useJUnit()
        systemProperty 'workingDirectory', "${project.buildDir}/server-work"
        doFirst {
            delete "${project.buildDir}/server-work"
        }
        testLogging {
            events 'failed'
            exceptionFormat = TestExceptionFormat.FULL
        }
    }

    tasks.named('test', Test) {
        exclude '**/*IT.class'
        exclude '**/*ITest.class'
        exclude '**/*PerfIT.class'
        exclude '**/*PerfITest.class'
    }

    def integrationTestSources = project.fileTree('src/test/java') {
        include '**/*IT.java'
        include '**/*ITest.java'
    }

    if (!integrationTestSources.isEmpty()) {
        tasks.register('integrationTest', Test) {
            description = 'Runs integration tests separated from the default unit test lifecycle.'
            group = 'verification'
            testClassesDirs = sourceSets.test.output.classesDirs
            classpath = sourceSets.test.runtimeClasspath
            include '**/*IT.class'
            include '**/*ITest.class'
            exclude '**/*PerfIT.class'
            exclude '**/*PerfITest.class'
            shouldRunAfter tasks.named('test')
        }
    }

    if (project.path == ':jdbm-partition') {
        tasks.named('test', Test) {
            exclude '**/DIRSERVER2102JdbmConcurrencyTest.class'
        }

        tasks.register('jdbmConcurrencyTest', Test) {
            description = 'Runs the DIRSERVER-2102 JDBM concurrency reproducer.'
            group = 'verification'
            testClassesDirs = sourceSets.test.output.classesDirs
            classpath = sourceSets.test.runtimeClasspath
            include '**/DIRSERVER2102JdbmConcurrencyTest.class'
            shouldRunAfter tasks.named('test')
        }
    }

    if (project.path == ':ldap-client-test') {
        tasks.named('test', Test) {
            exclude '**/LdapSSLConnectionTest.class'
        }

        tasks.register('ldapSslConnectionTest', Test) {
            description = 'Runs LDAP SSL and StartTLS tests that are sensitive to local TLS settings.'
            group = 'verification'
            testClassesDirs = sourceSets.test.output.classesDirs
            classpath = sourceSets.test.runtimeClasspath
            include '**/LdapSSLConnectionTest.class'
            shouldRunAfter tasks.named('test')
        }
    }

    if (project.path == ':server-annotations') {
        tasks.named('test', Test) {
            exclude '**/CreateKdcServerAnnotationTest.class'
            exclude '**/DirectoryServiceAnnotationTest.class'
        }

        tasks.register('serverAnnotationIntegrationTest', Test) {
            description = 'Runs server annotation tests that start DirectoryService, LDAP, and KDC services.'
            group = 'verification'
            testClassesDirs = sourceSets.test.output.classesDirs
            classpath = sourceSets.test.runtimeClasspath
            include '**/CreateKdcServerAnnotationTest.class'
            include '**/DirectoryServiceAnnotationTest.class'
            shouldRunAfter tasks.named('test')
        }
    }

    if (project.path == ':test-framework') {
        tasks.named('test', Test) {
            exclude '**/Test*.class'
            exclude '**/*Test.class'
            exclude '**/*Test*.class'
        }

        tasks.register('testFrameworkIntegrationTest', Test) {
            description = 'Runs tests that exercise the ApacheDS integration test framework itself.'
            group = 'verification'
            testClassesDirs = sourceSets.test.output.classesDirs
            classpath = sourceSets.test.runtimeClasspath
            include '**/Test*.class'
            include '**/*Test.class'
            include '**/*Test*.class'
            shouldRunAfter tasks.named('test')
        }
    }
}
